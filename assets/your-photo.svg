<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Photo Placeholder</title>
  <desc id="desc">Temporary portrait placeholder to be replaced with your professional image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7d42" />
      <stop offset="100%" stop-color="#8f45ff" />
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)" />
  <circle cx="400" cy="330" r="150" fill="rgba(255,255,255,0.3)" />
  <rect x="190" y="520" width="420" height="280" rx="140" fill="rgba(255,255,255,0.3)" />
  <text x="400" y="900" text-anchor="middle" fill="#ffffff" font-size="44" font-family="Inter, Arial, sans-serif" font-weight="700">Your Photo Here</text>
</svg>
